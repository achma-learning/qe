name: Keep baked data in sync

# The website is served by GitHub Pages straight from this branch's files
# (Settings -> Pages -> Deploy from a branch -> main -> /root). So the only job
# of CI is to keep the baked data (data/*.data.js, _counts.js, _topics.js) in
# step with the .txt sources -- including when you edit a .txt on github.com.
# When CI commits the rebuilt data back, Pages redeploys on its own.
on:
  push:
    branches: [main]
    paths:
      - 'data/**/*.txt'
      - 'assets/app.js'
      - 'assets/modules.js'
      - 'tools/**'
  pull_request:
    paths:
      - 'data/**/*.txt'
      - 'assets/app.js'
      - 'assets/modules.js'
      - 'tools/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # On PRs: block the merge if a question or answer would be silently lost.
      - name: Validate (strict)
        if: github.event_name == 'pull_request'
        run: node tools/check-data.js --strict

      # On pushes to main (and manual runs): re-bake and commit the result back.
      # The bot commit only touches data/*.data.js (+ _counts/_topics), which are
      # not in the trigger paths above, so it can't loop. [skip ci] is a 2nd guard.
      - name: Rebuild baked data and commit it back
        if: github.event_name != 'pull_request'
        run: |
          node tools/check-data.js
          node tools/build-data.js
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "Rebuild baked question data [skip ci]"
            git push || { echo "::error::Could not push. Enable Settings -> Actions -> General -> Workflow permissions -> Read and write."; exit 1; }
          else
            echo "Baked data already up to date."
          fi
