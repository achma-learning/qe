# Build the website from the question .txt files and publish it to GitHub Pages.
#
# What this gives you (the "vibe coder" contract):
#   • Edit a data/sX/*.txt file (here, on github.com, or anywhere) and push to
#     main  →  the live website rebuilds and updates by itself. No local Node.
#   • Open a PR that touches the data  →  it's checked, and the merge is blocked
#     if a question or answer would be silently lost.
#
# One-time setup (Settings → Pages → Build and deployment → Source = GitHub Actions).
# That's the only switch you must flip for the live site to work.

name: Build & deploy site

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'data/**'
      - 'assets/**'
      - 'modules/**'
      - 'tools/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write   # best-effort: commit the baked data back (keeps the offline ZIP current)
  pages: write      # deploy to GitHub Pages
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # On PRs: block the merge if the data has a problem (lost question/answer).
      - name: Validate data (strict)
        if: github.event_name == 'pull_request'
        run: node tools/check-data.js --strict

      # On pushes: just report issues, never block — your edits always go live.
      - name: Validate data (report)
        if: github.event_name != 'pull_request'
        run: node tools/check-data.js

      # Turn the .txt files into the baked data the site reads.
      - name: Bake data
        run: node tools/build-data.js

      # Keep the committed baked data (used by the offline ZIP) in sync too.
      # Best-effort: if it can't push, the live site has still been built below.
      - name: Commit baked data back
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "Rebuild baked question data [skip ci]"
            git push || echo "::warning::Could not push baked data (enable Settings → Actions → General → Read and write permissions). The website was still deployed."
          else
            echo "Baked data already up to date."
          fi

      # Assemble just the static files the website needs, then hand them to Pages.
      - name: Stage site
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -r assets data modules _site/

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
