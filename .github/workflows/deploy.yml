name: Build & deploy site

# What this does, in plain terms:
#   • You edit a question .txt (here, on github.com, anywhere) and push to main
#     → this rebuilds the baked data and publishes the website. Online updates
#     by itself; nothing to run locally.
#   • Open a PR that touches the data → it's validated and the merge is blocked
#     if a question or answer would be silently lost.
#
# Requires ONE setting (once):
#   Settings → Pages → Build and deployment → Source = "GitHub Actions".
# You already selected this, so deploys will start flowing from this workflow.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'data/**'
      - 'assets/**'
      - 'modules/**'
      - 'tools/**'
      - 'index.html'
      - 'curriculum.html'
  workflow_dispatch:

permissions:
  contents: write   # to commit the re-baked data back (keeps the offline ZIP current)
  pages: write      # to deploy to GitHub Pages
  id-token: write   # required by the Pages deploy

# Only one deploy at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # PRs: block the merge if the data has a problem (a lost question/answer).
      - name: Validate data (strict)
        if: github.event_name == 'pull_request'
        run: node tools/check-data.js --strict

      # Pushes/manual: report issues but never block — your edits still go live.
      - name: Validate data (report)
        if: github.event_name != 'pull_request'
        run: node tools/check-data.js || true

      # Turn the .txt files into the baked data the site reads, and scan
      # qe-analysis/<slug>/ for high-yield docs → qe-analysis/_analysis.js.
      - name: Bake data
        run: |
          node tools/build-data.js
          node tools/build-analysis.js
          node tools/build-curriculum.js

      # Keep the committed generated files in sync too (for the offline ZIP / git).
      # Best-effort: if it can't push, the live deploy below still happens.
      - name: Commit generated files back
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain data/ qe-analysis/_analysis.js)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/ qe-analysis/_analysis.js
            git commit -m "Rebuild baked data + analysis manifest [skip ci]"
            git push || echo "::warning::Could not push generated files (enable Settings → Actions → General → Read and write permissions). The site was still deployed."
          else
            echo "Generated files already up to date."
          fi

      # Stage exactly the files the website needs — INCLUDING the PWA + analysis docs.
      - name: Stage site
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site
          cp index.html report.html high-yield.html curriculum.html playlist-fmpm.html manifest.webmanifest sw.js icon.svg .nojekyll _site/
          cp -r assets data modules qe-analysis _site/

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
